<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saloon ERP – Gold Rush Edition</title>
<style>
/* --- DESIGN ANPASSUNGEN (Nur CSS) --- */
:root {
  --wood-dark: #2b1d0e;
  --wood-medium: #3a2715;
  --wood-light: #5a3b1f;
  --gold: #d7a85b;
  --paper: #f5e6c8;
  --danger: #b54a3a;
  --success: #2ecc71;
}

body {
  font-family: Arial, sans-serif;
  background: var(--wood-dark);
  color: var(--paper);
  margin: 0;
  padding: 20px;
}

/* Header & Nav */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  border-bottom: 2px solid var(--gold);
  padding-bottom: 10px;
}

/* Layout Container */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 24px;
  align-items: start;
}

.panel {
  background: var(--wood-medium);
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.3);
}

/* Listen-Ansicht für Verkäufe & Historie */
.table-scroll {
  width: 100%;
  max-height: 400px; /* Begrenzt die Höhe für bessere Übersicht */
  overflow-y: auto;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: var(--wood-light);
  position: sticky;
  top: 0;
  z-index: 10;
  padding: 10px;
  text-align: left;
}

td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--wood-light);
}

/* Artikel-Kacheln */
.item-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px;
  margin-bottom: 15px;
}

.item-grid button {
  background: var(--wood-light);
  color: var(--paper);
  border: 1px solid var(--gold);
  padding: 12px 8px;
  border-radius: 8px;
  cursor: pointer;
  transition: transform 0.1s;
}

.item-grid button:hover:not(:disabled) {
  background: #6e4928;
  transform: scale(1.02);
}

.item-grid button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* Buttons & Inputs */
button { padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
.topbtn { background: var(--gold); color: var(--wood-dark); }
.secondarybtn { background: var(--wood-light); color: var(--paper); }
.dangerbtn { background: var(--danger); color: white; }
input, select { padding: 8px; border-radius: 6px; border: none; margin-bottom: 5px; }

.bank-display { font-size: 32px; color: var(--success); font-weight: bold; }
.page { display: none; }
.page.active { display: block; }
.full { width: 100%; }

@media (max-width: 760px) { .container { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="topbar">
  <h1>🤠 Saloon Management System</h1>
  <div class="top-actions">
    <div style="padding: 8px 12px; background: var(--wood-light); border-radius: 10px;">
      Eingeloggt: <strong id="activeUserBadge">Niemand</strong>
    </div>
    <button class="topbtn" id="employeePageBtn" onclick="showPage('employee')">Mitarbeiter Login</button>
    <button class="secondarybtn" id="cashPageBtn" onclick="showPage('cash')" style="display:none;">Zurück zur Kasse</button>
  </div>
</div>

<div id="cashPage" class="page active">
  <div class="container">
    
    <div class="panel">
      <h2>Artikel</h2>
      <div id="itemsList"></div>
      <div class="notice" id="stockNotice" style="color:#ffd37a;"></div>
    </div>

    <div class="panel">
      <h2>Aktuelle Session</h2>
      <div class="table-scroll">
        <table id="cartTable"></table>
      </div>
      <div style="font-size: 20px; margin: 15px 0;">Umsatz: $<span id="sessionTotal">0.00</span></div>
      <button class="full" onclick="addSessionToBank()" style="background: var(--gold); margin-bottom: 10px;">Umsatz übertragen</button>
      <button class="full secondarybtn" onclick="clearSession()">Session löschen</button>
      <div id="salesNotice" style="color:#ffd37a; margin-top:10px;"></div>
    </div>

    <div class="panel" style="grid-column: span 2;">
      <h2>Verkaufshistorie (gelistete Verkäufe)</h2>
      <div class="table-scroll">
        <table id="salesHistoryTable"></table>
      </div>
      <button class="dangerbtn" onclick="clearSalesHistory()" style="margin-top:12px;">Historie löschen</button>
    </div>

    <div class="panel">
      <h2>Gesamte Kasse</h2>
      <div class="bank-display">$ <span id="bankDisplay">0.00</span></div>
      <input type="number" id="bank" onchange="saveBank()" class="full">
      <hr style="border:1px solid #6a4a2a; margin: 20px 0;">
      <h3>Neuer Artikel</h3>
      <input id="newName" placeholder="Name" class="full">
      <input id="newPrice" type="number" placeholder="Verkauf $" class="full">
      <input id="newCost" type="number" placeholder="Einkauf $" class="full">
      <input id="newStock" type="number" placeholder="Bestand" class="full">
      <select id="newCategory" class="full">
        <option value="Getränke">Getränke</option>
        <option value="Essen">Essen</option>
      </select>
      <button class="full" onclick="addNewProduct()" style="margin-top:10px;">Hinzufügen</button>
    </div>

    <div class="panel">
      <h2>Lagerbestand</h2>
      <div class="table-scroll">
        <table id="stockTable"></table>
      </div>
    </div>

  </div>
</div>

<div id="employeePage" class="page">
  <div class="container">
      <div class="panel">
          <h2>Mitarbeiter Login</h2>
          <input id="newUserName" type="text" placeholder="Name" class="full">
          <button onclick="addUser()" class="topbtn full" style="margin-top:5px;">Mitarbeiter anlegen</button>
          <hr style="border:1px solid #6a4a2a; margin:15px 0;">
          <select id="activeUserSelect" class="full"></select>
          <button onclick="setActiveUser()" class="full">Einloggen</button>
          <div style="margin-top:15px; padding:8px; background:var(--wood-light); border-radius:8px;">
            Aktiv: <strong id="activeUserLabel">Niemand</strong>
          </div>
          <div id="userNotice" style="color:#ffd37a; font-size:14px; margin-top:5px;"></div>
      </div>
      </div>
</div>
