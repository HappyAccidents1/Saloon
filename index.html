<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saloon ERP - Gold Rush Edition</title>
<style>
:root {
  --wood-dark: #2b1d0e;
  --wood-medium: #3a2715;
  --wood-light: #5a3b1f;
  --gold: #d7a85b;
  --paper: #f5e6c8;
  --danger: #b54a3a;
  --success: #2ecc71;
  --shadow: 0 4px 15px rgba(0,0,0,0.5);
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: var(--wood-dark);
  color: var(--paper);
  margin: 0;
  padding: 0;
  line-height: 1.6;
}

/* --- Header & Navigation --- */
.topbar {
  background: rgba(0,0,0,0.3);
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 3px solid var(--gold);
  position: sticky;
  top: 0;
  z-index: 1000;
  backdrop-filter: blur(5px);
}

h1 { margin: 0; font-variant: small-caps; letter-spacing: 2px; color: var(--gold); }

.top-actions { display: flex; gap: 15px; align-items: center; }

/* --- Layout Container --- */
.main-content {
  max-width: 1600px;
  margin: 20px auto;
  padding: 0 20px;
}

.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 350px;
  gap: 25px;
}

.admin-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
  gap: 25px;
}

/* --- Panels / Cards --- */
.panel {
  background: var(--wood-medium);
  border-radius: 12px;
  padding: 20px;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--gold);
  margin-bottom: 25px;
}

.panel h2 {
  margin-top: 0;
  border-bottom: 1px solid var(--wood-light);
  padding-bottom: 10px;
  color: var(--gold);
  font-size: 1.2rem;
  text-transform: uppercase;
}

/* --- Artikel Kacheln --- */
.item-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
}

.product-card {
  background: var(--wood-light);
  border: 1px solid transparent;
  padding: 15px;
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 100px;
}

.product-card:hover:not(:disabled) {
  border-color: var(--gold);
  transform: translateY(-3px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.product-card:disabled { opacity: 0.4; cursor: not-allowed; }
.product-card .price { font-weight: bold; color: var(--gold); font-size: 1.1rem; }
.product-card .stock { font-size: 0.8rem; color: #aaa; }

/* --- Tabellen Styling --- */
.table-scroll {
  max-height: 400px;
  overflow-y: auto;
  border-radius: 8px;
  background: rgba(0,0,0,0.1);
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: var(--wood-light);
  position: sticky;
  top: 0;
  padding: 12px;
  text-align: left;
  font-size: 0.9rem;
}

td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--wood-light);
  font-size: 0.9rem;
}

tr:hover td { background: rgba(255,255,255,0.05); }

/* --- Buttons --- */
button {
  background: var(--gold);
  color: var(--wood-dark);
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  transition: opacity 0.2s;
}

button:hover { opacity: 0.9; }

button.secondarybtn { background: var(--wood-light); color: var(--paper); }
button.dangerbtn { background: var(--danger); color: white; }
button.smallbtn { padding: 5px 10px; font-size: 0.8rem; }

/* --- Kassenbereich Spezifisch --- */
.cart-total {
  font-size: 1.5rem;
  font-weight: bold;
  text-align: right;
  margin: 15px 0;
  color: var(--success);
}

.bank-display-big {
  font-size: 2.5rem;
  color: var(--success);
  text-align: center;
  font-weight: bold;
  margin: 10px 0;
  text-shadow: 0 0 10px rgba(46, 204, 113, 0.3);
}

/* --- Badge & Info --- */
.badge-info {
  background: var(--wood-light);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.85rem;
}

.page { display: none; }
.page.active { display: block; }

@media (max-width: 1000px) {
  .dashboard-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="topbar">
  <h1>🤠 Saloon ERP</h1>
  <div class="top-actions">
    <div class="badge-info">Logged in: <strong id="activeUserBadge">Guest</strong></div>
    <button id="employeePageBtn" onclick="showPage('employee')">Verwaltung</button>
    <button id="cashPageBtn" class="secondarybtn" onclick="showPage('cash')" style="display:none;">Zur Kasse</button>
  </div>
</div>

<div class="main-content">

  <div id="cashPage" class="page active">
    <div class="dashboard-grid">
      
      <div class="left-col">
        <div class="panel">
          <h2>Inventar / Verkauf</h2>
          <div id="itemsList"></div>
        </div>

        <div class="panel">
          <h2>Letzte Buchungen (Historie)</h2>
          <div class="table-scroll">
            <table id="salesHistoryTable">
              <thead>
                <tr>
                  <th>Zeit</th>
                  <th>Artikel</th>
                  <th>Menge</th>
                  <th>Summe</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
          <button class="dangerbtn smallbtn" onclick="clearSalesHistory()" style="margin-top:10px;">Historie leeren</button>
        </div>
      </div>

      <div class="right-col">
        <div class="panel">
          <h2>Aktueller Warenkorb</h2>
          <table id="cartTable"></table>
          <div class="cart-total">$<span id="sessionTotal">0.00</span></div>
          <button class="full-width" onclick="addSessionToBank()" style="width: 100%; margin-bottom: 10px; padding: 15px;">💰 UMSATZ BUCHEN</button>
          <button class="secondarybtn smallbtn" onclick="clearSession()" style="width: 100%;">Warenkorb leeren</button>
        </div>

        <div class="panel" style="text-align: center;">
          <h2>💰 Saloon Kasse</h2>
          <div class="bank-display-big">$ <span id="bankDisplay">0.00</span></div>
          <p style="font-size: 0.8rem; opacity: 0.7;">Zentraler Bestand im Safe</p>
        </div>
        
        <div class="panel">
          <h2>Mitarbeiter Ranking</h2>
          <table id="cashSalesOverviewTable"></table>
        </div>
      </div>

    </div>
  </div>

  <div id="employeePage" class="page">
    <div class="admin-grid">
      
      <div class="panel">
        <h2>Mitarbeiter & Login</h2>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
           <input id="newUserName" type="text" placeholder="Name..." style="flex:1; padding:8px;">
           <button onclick="addUser()">Hinzufügen</button>
        </div>
        <select id="activeUserSelect" style="width:100%; padding:10px; margin-bottom:10px;"></select>
