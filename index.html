<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saloon ERP – Supabase</title>
<style>
body{font-family:Arial,sans-serif;background:#2b1d0e;color:#f5e6c8;margin:0;padding:20px}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
h1{margin:0}
.top-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.container{display:grid;grid-template-columns:repeat(4,minmax(260px,340px));justify-content:center;gap:24px;align-items:start}
.panel{background:#3a2715;padding:20px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,0.2)}
button{width:100%;padding:10px;margin:5px 0;font-size:15px;cursor:pointer;border:none;border-radius:8px}
button:disabled{cursor:not-allowed;opacity:.55}
.smallbtn{padding:4px 8px;font-size:12px;width:auto;margin:0}
.topbtn{width:auto;padding:10px 14px;background:#d7a85b;color:#2b1d0e;font-weight:bold}
.secondarybtn{width:auto;padding:10px 14px;background:#5a3b1f;color:#f5e6c8}
.dangerbtn{background:#b54a3a;color:#fff}
table{width:100%;border-collapse:collapse;margin-top:8px}
th,td{padding:6px;border-bottom:1px solid #6a4a2a;text-align:left;vertical-align:top}
.total{font-size:20px;margin-top:10px}
input,select{padding:6px;font-size:16px;border-radius:6px;border:none;box-sizing:border-box}
input[type="number"]{width:100px;text-align:center}
.full{width:100%}
.stock-input{width:70px;font-size:14px;padding:4px}
.name-input{width:140px;font-size:14px;padding:4px;text-align:left}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#5a3b1f;font-size:12px;margin-bottom:8px}
.notice{margin-top:12px;min-height:20px;font-size:14px;color:#ffd37a}
.info-box{padding:8px 12px;border-radius:10px;background:#5a3b1f;font-size:14px}
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin-bottom:10px}
.item-grid button{min-height:48px}
.section-gap{margin-top:16px}
.page{display:none}
.page.active{display:block}
.employee-wrap{max-width:1700px;margin:0 auto}
.employee-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:24px}
.wide-panel{grid-column:span 2}
.full-width-panel{grid-column:1 / -1}
.panel table{display:block;overflow-x:auto;width:100%}
.panel table tbody,.panel table tr{width:100%;table-layout:auto}
.table-scroll{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
#salesOverviewTable th,#salesOverviewTable td,#purchaseHistoryTable th,#purchaseHistoryTable td{font-size:15px}
#purchaseHistoryTable td:first-child{min-width:140px}
#salesOverviewTable td:first-child{min-width:140px}
#editProductsTable{min-width:860px}
#editProductsTable th,#editProductsTable td{white-space:nowrap}
#editProductsTable td:first-child{min-width:220px}
#editProductsTable td:nth-child(2),#editProductsTable td:nth-child(3){min-width:120px}
#editProductsTable td:nth-child(4){min-width:110px}
#editProductsTable td:nth-child(5){min-width:190px}
.name-input{width:100%;min-width:180px}
@media (max-width:1200px){#editProductsTable{min-width:780px}}

hr{border:1px solid #6a4a2a;margin:20px 0}
.status-ok{color:#8ed081}
.status-bad{color:#ff9b8a}
@media (max-width:1450px){.container{grid-template-columns:repeat(2,minmax(260px,340px))}}
@media (max-width:1200px){.wide-panel{grid-column:span 1}}
@media (max-width:980px){.employee-grid{grid-template-columns:1fr}}
@media (max-width:760px){.container{grid-template-columns:1fr}}

.bank-display{
  font-size:32px;
  color:#2ecc71;
  font-weight:bold;
  margin:10px 0 14px 0;
}
.bank-label{
  margin:0 0 4px 0;
}

</style>
</head>
<body>
<div class="topbar">
  <h1>🤠 Saloon Management System</h1>
  <div class="top-actions">
    <div class="info-box">Eingeloggt: <strong id="activeUserBadge">Niemand</strong></div>
    <button class="topbtn" id="employeePageBtn" onclick="showPage('employee')">Mitarbeiter Login</button>
    <button class="secondarybtn" id="cashPageBtn" onclick="showPage('cash')" style="display:none;">Zurück zur Kasse</button>
  </div>
</div>

<div id="cashPage" class="page active">
  <div class="container">
    <div class="panel">
      <h2>Artikel</h2>
      <div id="itemsList"></div>
      <div class="notice" id="stockNotice"></div>
    </div>

    <div class="panel">
      <h2>Verkäufe</h2>
      <table id="cartTable"></table>
      <div class="total">Session Umsatz: $<span id="sessionTotal">0.00</span></div><div class="notice" id="salesNotice"></div>
      <button onclick="clearSession()">Session löschen</button>
      <button onclick="addSessionToBank()">Umsatz übertragen</button>
    </div>
